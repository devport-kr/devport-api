spring:
  application:
    name: devport-api
  cloud:
    aws:
      region:
        static: ${AWS_REGION:ap-northeast-2}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:devport}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  h2:
    console:
      enabled: false

  web:
    cors:
      allowed-origins:
        - https://devport.kr
        - https://www.devport.kr
      allowed-methods:
        - GET
        - POST
        - PUT
        - DELETE
      allowed-headers: "*"
      allow-credentials: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: "https://devport.kr/login/oauth2/code/{registrationId}"
            scope:
              - email
              - profile
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            redirect-uri: "https://devport.kr/login/oauth2/code/{registrationId}"
            scope:
              - user:email
              - read:user
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            redirect-uri: "https://devport.kr/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            scope:
              - name
              - email
            client-name: Naver
        provider:
          github:
            user-info-uri: https://api.github.com/user
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

server:
  port: ${PORT:8080}
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
  http2:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    redis:
      enabled: true
    db:
      enabled: true
  info:
    env:
      enabled: true
  cloudwatch:
    metrics:
      export:
        namespace: DevPort
        step: 1m
        enabled: true
  metrics:
    enable:
      jvm: false
      process.cpu: true
      http.server.requests: true
      application: true
    tags:
      application: devport-api
      environment: ${ENVIRONMENT:production}

logging:
  level:
    kr.devport: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [requestId=%X{requestId:-none}] - %msg%n"
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} [requestId=%X{requestId:-none}] - %msg%n"
  file:
    name: /var/log/devport/app.log
  logback:
    rollingpolicy:
      max-file-size: 50MB
      max-history: 3
      total-size-cap: 150MB

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-ms: 3600000
    refresh-token-expiration-ms: 2592000000

  oauth2:
    redirect-uri: https://devport.kr/oauth2/redirect
    failure-redirect-uri: https://devport.kr/login

  auth:
    refresh-cookie-name: devport_refresh_token
    refresh-cookie-path: /api/auth
    refresh-cookie-domain: .devport.kr
    refresh-cookie-secure: true
    refresh-cookie-same-site: Lax
    oauth2-exchange-ttl-seconds: 60
