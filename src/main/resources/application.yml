spring:
  application:
    name: devport-api

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:devportdb}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:devport_user}
    password: ${DB_PASSWORD:devport_password}
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        bytecode:
          provider: none
        jdbc:
          lob:
            non_contextual_creation: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 8
          min-idle: 2
          max-wait: -1ms

  cache:
    type: redis
    redis:
      time-to-live: 300000

  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  web:
    cors:
      allowed-origins:
        - http://localhost:5173
        - https://devport.kr
      allowed-methods:
        - GET
        - POST
        - PUT
        - DELETE
      allowed-headers: "*"
      allow-credentials: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope:
              - user:email
              - read:user
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            scope:
              - name
              - email
            client-name: Naver
        provider:
          github:
            user-info-uri: https://api.github.com/user
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

server:
  port: 8080
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,loggers,caches
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    redis:
      enabled: true
    db:
      enabled: true
  info:
    env:
      enabled: true
  cloudwatch:
    metrics:
      export:
        enabled: false

logging:
  level:
    kr.devport: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.jdbc.core: DEBUG
    org.springframework.cache: TRACE
    org.springframework.data.redis: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} [requestId=%X{requestId:-none}] - %msg%n"

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

app:
  jwt:
    secret: ${JWT_SECRET:}
    access-token-expiration-ms: 3600000
    refresh-token-expiration-ms: 2592000000

  oauth2:
    redirect-uri: http://localhost:5173/oauth2/redirect
    failure-redirect-uri: http://localhost:5173/login

  auth:
    refresh-cookie-name: devport_refresh_token
    refresh-cookie-path: /api/auth
    refresh-cookie-domain:
    refresh-cookie-secure: false
    refresh-cookie-same-site: Lax
    oauth2-exchange-ttl-seconds: 60

  email:
    from: ${EMAIL_FROM:noreply@devport.kr}
    verification-url: ${FRONTEND_URL:http://localhost:5173}/verify-email?token={token}
    reset-password-url: ${FRONTEND_URL:http://localhost:5173}/reset-password?token={token}

  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-5-nano}
    max-completion-tokens: ${OPENAI_MAX_COMPLETION_TOKENS:128000}

  crawler:
    webhook-secret: ${CRAWLER_WEBHOOK_SECRET:}

cloudflare:
  turnstile:
    secret-key: ${CLOUDFLARE_TURNSTILE_SECRET_KEY:your_secret_key_here}
