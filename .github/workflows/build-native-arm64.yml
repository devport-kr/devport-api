name: Build and Push Native Image (arm64)

on:
  push:
    branches:
      - dev
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-native-image:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'liberica'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Download PGO profile from S3
        run: |
          set -euo pipefail
          S3_URI="s3://${{ secrets.PGO_S3_BUCKET }}/pgo/default.iprof"
          if ! aws s3 cp "$S3_URI" ./default.iprof; then
            echo "::error::Failed to fetch PGO profile from $S3_URI"
            echo "If this is the first build, run 'build-native-pgo-instrument' workflow,"
            echo "extract default.iprof from the instrumented container, and upload to S3."
            exit 1
          fi
          ls -la ./default.iprof

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            suffix=-native-arm64,onlatest=true
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest

      - name: Build and push native image with Cloud Native Buildpacks
        run: |
          TAGS="${{ steps.meta.outputs.tags }}"
          FIRST_TAG=$(echo "$TAGS" | head -n 1)

          # Build native image with PGO applied (--pgo=/workspace/default.iprof).
          # default.iprof is fetched from S3 in an earlier step and lives at the repo root;
          # Paketo copies the build context into /workspace inside the builder container.
          ./gradlew clean bootBuildImage \
            --imageName="$FIRST_TAG" \
            -Pspring-boot.build-image.imageName="$FIRST_TAG" \
            -PpgoProfile=/workspace/default.iprof \
            --no-build-cache \
            --no-daemon

          # Push the image
          docker push "$FIRST_TAG"

          # Tag and push additional tags
          for tag in $TAGS; do
            if [ "$tag" != "$FIRST_TAG" ]; then
              docker tag "$FIRST_TAG" "$tag"
              docker push "$tag"
            fi
          done
