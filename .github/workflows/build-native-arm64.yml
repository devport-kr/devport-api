name: Build and Push Native Image (arm64)

on:
  push:
    branches:
      - dev
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-native-image:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'liberica'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            suffix=-native-arm64,onlatest=true
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest

      - name: Build and push native image with Cloud Native Buildpacks
        run: |
          TAGS="${{ steps.meta.outputs.tags }}"
          FIRST_TAG=$(echo "$TAGS" | head -n 1)

          # Build native image (--no-build-cache prevents stale AOT outputs from Gradle build cache)
          ./gradlew clean bootBuildImage \
            --imageName="$FIRST_TAG" \
            -Pspring-boot.build-image.imageName="$FIRST_TAG" \
            --no-build-cache \
            --no-daemon

          # Push the image
          docker push "$FIRST_TAG"

          # Tag and push additional tags
          for tag in $TAGS; do
            if [ "$tag" != "$FIRST_TAG" ]; then
              docker tag "$FIRST_TAG" "$tag"
              docker push "$tag"
            fi
          done
