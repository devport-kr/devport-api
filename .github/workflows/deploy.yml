name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Deploy via SSM (blue-green)
        run: |
          # Write the deploy script to a temp file on the runner.
          # Single-quoted heredoc (DEPLOY_EOF) prevents any shell expansion here —
          # the script runs as-is on EC2.
          cat > /tmp/deploy.sh << 'DEPLOY_EOF'
          #!/bin/bash
          set -euo pipefail

          COMPOSE_DIR="/opt/devport"
          NGINX_UPSTREAM="/opt/devport/nginx/upstream.conf"

          log() { echo "[DEPLOY $(date '+%Y-%m-%d %H:%M:%S')] $*"; }
          err() { echo "[DEPLOY $(date '+%Y-%m-%d %H:%M:%S')] ERROR: $*" >&2; }

          cd "$COMPOSE_DIR"

          switch_nginx_to() {
            local slot=$1
            printf 'upstream devport_api {\n    server devport-api-%s:8080;\n    keepalive 32;\n}\n' "$slot" > "$NGINX_UPSTREAM"
            docker exec devport-nginx nginx -s reload
            log "Nginx → $slot"
          }

          wait_healthy() {
            local container=$1
            local max_wait=30
            log "Waiting for $container..."
            for i in $(seq 1 $max_wait); do
              if docker exec "$container" /workspace/health-check > /dev/null 2>&1; then
                log "$container healthy (${i}s)"
                return 0
              fi
              sleep 1
            done
            err "$container not healthy after ${max_wait}s"
            return 1
          }

          log "=== Deploy started ==="

          # Login to GHCR
          echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

          # 1. Pull & start green
          docker compose --profile green pull devport-api-green
          docker compose --profile green up -d devport-api-green

          # 2. Health check green — abort if unhealthy, blue stays untouched
          if ! wait_healthy devport-api-green; then
            log "Aborting deploy. Blue still active."
            docker compose --profile green stop devport-api-green
            docker compose --profile green rm -f devport-api-green
            exit 1
          fi

          # 3. Cut nginx to green (zero-downtime)
          switch_nginx_to green

          # 4. Stop blue, pull new image, restart blue
          docker compose stop devport-api-blue
          docker compose pull devport-api-blue
          docker compose up -d devport-api-blue

          # 5. Health check blue — if it fails, green stays active
          if ! wait_healthy devport-api-blue; then
            err "Blue failed to restart. Green remains active."
            exit 1
          fi

          # 6. Cut nginx back to blue
          switch_nginx_to blue

          # 7. Clean up green
          docker compose --profile green stop devport-api-green
          docker compose --profile green rm -f devport-api-green

          log "=== Deploy complete. Blue is active. ==="
          DEPLOY_EOF

          # Python handles all JSON escaping — no quoting nightmares
          python3 -c "
          import json
          script = open('/tmp/deploy.sh').read()
          # Inject GHCR credentials as env vars so they never touch disk
          script = 'export GHCR_PAT=${{ secrets.GITHUB_TOKEN }}\nexport GHCR_USER=${{ github.actor }}\n' + script
          payload = {
              'InstanceIds': ['${{ secrets.EC2_INSTANCE_ID }}'],
              'DocumentName': 'AWS-RunShellScript',
              'Parameters': {'commands': [script]},
              'Comment': 'Deploy ${{ github.sha }} by ${{ github.actor }}'
          }
          print(json.dumps(payload))
          " > /tmp/ssm-payload.json

          COMMAND_ID=$(aws ssm send-command \
            --cli-input-json file:///tmp/ssm-payload.json \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"
          echo "COMMAND_ID=$COMMAND_ID" >> "$GITHUB_ENV"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}"

      - name: Print deploy output
        if: always()
        run: |
          aws ssm get-command-invocation \
            --command-id "${{ env.COMMAND_ID }}" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "[Status, StandardOutputContent, StandardErrorContent]" \
            --output text
